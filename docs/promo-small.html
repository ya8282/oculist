<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 440px; height: 280px; overflow: hidden; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Ambient amber glow, top-right */
    .glow {
      position: absolute;
      top: -60px; right: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(251,191,36,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Secondary glow, bottom-left */
    .glow2 {
      position: absolute;
      bottom: -80px; left: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 28px 32px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .wordmark {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fafafa;
    }

    /* Headline */
    .headline {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .h-blurry {
      font-size: 20px;
      font-weight: 700;
      color: #a1a1aa;
      letter-spacing: -0.02em;
      filter: blur(3.5px);
      opacity: 0.65;
      margin-bottom: 6px;
      user-select: none;
    }

    .h-line {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .h-line.dim { color: #a1a1aa; }
    .h-line.accent { color: #f59e0b; }

    /* Footer row */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tagline {
      font-size: 13px;
      color: #71717a;
      letter-spacing: 0.01em;
    }

    /* Beacon rings (right side) */
    .rings {
      position: absolute;
      right: 40px;
      bottom: 48px;
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid #f59e0b;
    }

    .r1 { width: 18px; height: 18px; opacity: 0.9; }
    .r2 { width: 38px; height: 38px; opacity: 0.45; }
    .r3 { width: 62px; height: 62px; opacity: 0.18; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      box-shadow: 0 0 10px 3px rgba(251,191,36,0.6);
    }

    /* Chrome badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 100px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #f59e0b;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="content">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fef08a"/>
          <stop offset="60%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#d97706"/>
        </radialGradient>
      </defs>
      <circle cx="64" cy="64" r="62" fill="url(#g)"/>
      <circle cx="64" cy="64" r="26" fill="none" stroke="#fff" stroke-width="11"/>
    </svg>
    <span class="wordmark">Oculist</span>
  </div>

  <div class="headline">
    <div class="h-blurry">Stop squinting.</div>
    <div class="h-line dim">Find it</div>
    <div class="h-line accent">instantly.</div>
  </div>

  <div class="footer-row">
    <div class="tagline">Animated beacons for Chrome find-in-page</div>
  </div>
</div>

<div class="rings">
  <div class="ring r3"></div>
  <div class="ring r2"></div>
  <div class="ring r1"></div>
  <div class="dot"></div>
</div>

</body>
</html>
