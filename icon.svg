<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <!-- Background circular badge -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" />
  <rect width="116" height="116" x="6" y="6" rx="22" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.3" />
  
  <!-- Pulsing decorative rings behind the main icon to mimic oculist visual effect -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="#fef08a" stroke-width="2" opacity="0.15" />
  <circle cx="64" cy="64" r="48" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.08" />

  <!-- Sunglasses Icon -->
  <g transform="translate(14, 32)">
    <!-- Left Lens -->
    <path d="M12,20 C12,6 44,6 44,20 C44,34 12,44 12,20 Z" fill="#111827" stroke="url(#goldGrad)" stroke-width="4.5" />
    <!-- Right Lens -->
    <path d="M56,20 C56,6 88,6 88,20 C88,34 56,44 56,20 Z" fill="#111827" stroke="url(#goldGrad)" stroke-width="4.5" />
    <!-- Lens Reflection Highlights -->
    <path d="M18,16 Q28,8 38,16" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <path d="M62,16 Q72,8 82,16" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <!-- Bridge -->
    <path d="M44,18 Q50,14 56,18" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <!-- Left temple attachment -->
    <path d="M12,18 L2,16" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Right temple attachment -->
    <path d="M88,18 L98,16" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
